<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#F4F1EA"/>

  <!-- Hairline border -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#111110" stroke-width="1" opacity="0.16"/>

  <!-- Eyebrow -->
  <text x="80" y="110" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="16" letter-spacing="3" fill="#5C5849">
    NORVEN · EST. MMIX
  </text>

  <!-- Headline -->
  <text x="80" y="290" font-family="'Cormorant Garamond', Georgia, serif" font-size="120" font-weight="400" fill="#111110">
    Architecture
  </text>
  <text x="80" y="410" font-family="'Cormorant Garamond', Georgia, serif" font-size="120" font-weight="400" fill="#111110">
    of consequence.
  </text>

  <!-- Slab silhouette right -->
  <g transform="translate(880, 130)">
    <rect x="20"  y="0"   width="200" height="36" fill="#111110" opacity="0.95"/>
    <rect x="25"  y="40"  width="190" height="36" fill="#111110" opacity="0.95"/>
    <rect x="30"  y="80"  width="180" height="36" fill="#111110" opacity="0.95"/>
    <rect x="35"  y="120" width="170" height="36" fill="#B58A50" opacity="0.88"/>
    <rect x="40"  y="160" width="160" height="36" fill="#111110" opacity="0.95"/>
    <rect x="45"  y="200" width="150" height="36" fill="#111110" opacity="0.95"/>
    <rect x="50"  y="240" width="140" height="36" fill="#B58A50" opacity="0.88"/>
    <rect x="55"  y="280" width="130" height="36" fill="#111110" opacity="0.95"/>
    <rect x="60"  y="320" width="120" height="36" fill="#111110" opacity="0.95"/>
    <line x1="0" y1="362" x2="240" y2="362" stroke="#111110" stroke-width="1"/>
  </g>

  <!-- Footer row -->
  <line x1="80" y1="530" x2="1120" y2="530" stroke="#111110" stroke-width="0.5" opacity="0.16"/>
  <text x="80" y="570" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="2" fill="#5C5849">
